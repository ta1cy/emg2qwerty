# @package _global_
module:
  _target_: emg2qwerty.lightning.TDSConvLSTMCTCModule
  in_features: 528              # freq * channels = (n_fft // 2 + 1) * 16
  mlp_features: [384]
  # CNN params (same as original TDSConv)
  block_channels: [24, 24, 24, 24]
  kernel_width: 32
  # LSTM params (added on top)
  hidden_size: 256
  lstm_num_layers: 2
  lstm_dropout: 0.2
  bidirectional: true

datamodule:
  _target_: emg2qwerty.lightning.WindowedEMGDataModule
  window_length: 8000
  padding: [1800, 200]
